aid: vehicle-databases
name: Vehicle Databases
description: >-
  Vehicle Databases provides automotive maintenance schedule APIs with OEM-compliant
  service schedules for vehicles up to 200,000 miles. Delivers maintenance intervals,
  service items, fluids, and recall data for automotive service platforms, fleet
  management systems, and consumer maintenance reminder applications.
