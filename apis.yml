    url: https://vehicledatabases.com/vehicle-maintenance-api
  - type: Pricing
    url: https://vehicledatabases.com/pricing
  - type: SpectralRules
    url: rules/vehicle-databases-spectral-rules.yml
    title: Vehicle Databases Spectral Rules
  - type: Vocabulary
    url: vocabulary/vehicle-databases-vocabulary.yml
    title: Vehicle Databases Vocabulary
  - type: NaftikoCapability
    url: capabilities/vehicle-maintenance.yaml
    title: Vehicle Maintenance
  - type: Features
    data:
      - name: OEM-Compliant Maintenance Schedules
        description: >-
          Factory maintenance schedules matching OEM specifications for vehicles
          up to 200,000 miles with mileage and time-based service intervals.
      - name: Service Item Details
        description: >-
          Detailed service item data including fluid specifications, part numbers,
          labor time estimates, and OEM-required procedures for each service.
      - name: VIN Decoder
        description: >-
          Decode 17-character VINs to extract make, model, year, engine, trim,
          and manufacturing details for vehicle identification.
      - name: Recall Data
        description: >-
          NHTSA recall information linked to specific vehicles including recall
          dates, component affected, risk description, and remedy status.
      - name: Technical Service Bulletins
        description: >-
          OEM technical service bulletins (TSBs) for specific vehicle issues
          including symptom description, diagnosis, and corrective action.
  - type: UseCases
    data:
      - name: Fleet Maintenance Management
        description: >-
          Automate maintenance scheduling for commercial and enterprise fleets
          using OEM-compliant service intervals and mileage-based triggers.
      - name: Auto Repair Shop Management
        description: >-
          Integrate maintenance schedules and TSBs into shop management systems
          to provide accurate service recommendations and labor estimates.
      - name: Consumer Maintenance Reminders
        description: >-
          Power maintenance reminder apps and connected car services with
          personalized OEM service schedules based on vehicle and mileage.
      - name: Insurance Telematics
        description: >-
          Combine telematics mileage data with maintenance schedules to provide
          proactive service alerts in usage-based insurance applications.

