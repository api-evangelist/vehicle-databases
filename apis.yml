apis:
  - aid: vehicle-databases:vehicle-databases
    name: Vehicle Databases Maintenance API
    description: >-
      The Vehicle Databases Maintenance API delivers OEM-compliant maintenance
      schedules for vehicles up to 200,000 miles. Provides service intervals by
      mileage and time, service item descriptions, fluid specifications, part
      numbers, labor time estimates, recall notices, technical service bulletins,
      and vehicle decoder (VIN) information for fleet operators, repair shops,
      and consumer-facing automotive applications.
    humanURL: https://vehicledatabases.com/vehicle-maintenance-api
    tags:
      - Automotive
